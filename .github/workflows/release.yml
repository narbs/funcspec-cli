name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: funcspec
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} -p funcspec-cli

      - name: Build with cargo
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} -p funcspec-cli

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BINARY_PATH="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          strip "$BINARY_PATH" || true
          echo "BINARY_PATH=$BINARY_PATH" >> $GITHUB_ENV

      - name: Sign macOS binary
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate and create keychain
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Sign the binary (after strip)
          codesign --force --options runtime \
            --sign "Developer ID Application: Tambit Software LLC (89A85NT3Y4)" \
            --timestamp \
            "$BINARY_PATH"
          codesign --verify --verbose "$BINARY_PATH"

          # Cleanup
          rm -f certificate.p12

      - name: Create archive (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ARCHIVE="${{ env.BINARY_NAME }}-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.zip"
          zip -j "$ARCHIVE" "$BINARY_PATH"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Create archive (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ARCHIVE="${{ env.BINARY_NAME }}-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "${{ env.BINARY_NAME }}"
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Notarize macOS archive
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$ARCHIVE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $TARGET = "${{ matrix.target }}"
          $ARCHIVE = "${{ env.BINARY_NAME }}-${VERSION}-${TARGET}.zip"
          Compress-Archive `
            -Path "target\${{ matrix.target }}\release\${{ env.BINARY_NAME }}.exe" `
            -DestinationPath $ARCHIVE
          echo "ASSET=$ARCHIVE" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksums
        run: |
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) | sort | while read f; do
            sha256sum "$f" | awk -v bn="$(basename "$f")" '{print $1 "  " bn}'
          done > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            checksums.sha256

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Skip pre-releases (tags containing "-", e.g. v0.3.0-rc1).
    if: ${{ !contains(github.ref_name, '-') }}

    steps:
      - name: Checkout source repo (formula template)
        uses: actions/checkout@v5
        with:
          path: source

      - name: Checkout tap repo
        uses: actions/checkout@v5
        with:
          repository: narbs/homebrew-funcspec
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern 'checksums.sha256' \
            --dir checksums

      - name: Render formula into tap
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"

          extract_sha() {
            local pattern="$1"
            local sha
            sha=$(awk -v p="$pattern" '$2 == p {print $1}' checksums/checksums.sha256)
            if [ -z "$sha" ]; then
              echo "ERROR: no SHA256 found for $pattern" >&2
              exit 1
            fi
            echo "$sha"
          }

          MACOS_X86=$(extract_sha "funcspec-v${VERSION}-x86_64-apple-darwin.zip")
          MACOS_ARM=$(extract_sha "funcspec-v${VERSION}-aarch64-apple-darwin.zip")
          LINUX_X86=$(extract_sha "funcspec-v${VERSION}-x86_64-unknown-linux-musl.tar.gz")
          LINUX_ARM=$(extract_sha "funcspec-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz")

          mkdir -p tap/Formula
          sed \
            -e "s|version \"[^\"]*\"|version \"${VERSION}\"|" \
            -e "s|PLACEHOLDER_X86_64_DARWIN_SHA256|${MACOS_X86}|" \
            -e "s|PLACEHOLDER_AARCH64_DARWIN_SHA256|${MACOS_ARM}|" \
            -e "s|PLACEHOLDER_X86_64_LINUX_SHA256|${LINUX_X86}|" \
            -e "s|PLACEHOLDER_AARCH64_LINUX_SHA256|${LINUX_ARM}|" \
            source/Formula/funcspec.rb > tap/Formula/funcspec.rb

      - name: Commit and push to tap
        working-directory: tap
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/funcspec.rb
          if git diff --staged --quiet; then
            echo "No formula changes to commit"
          else
            git commit -m "funcspec ${{ steps.version.outputs.VERSION }}"
            git push
          fi
