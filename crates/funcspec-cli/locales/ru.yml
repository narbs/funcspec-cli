cli:
  about: "Интерфейс командной строки для FuncSpec — управление спецификациями с помощью ИИ"
  verbose: "Включить подробный вывод (HTTP-запросы/ответы)"
  debug: "Включить отладочный вывод (полные заголовки, тела, тайминги)"
  format: "Формат вывода (по умолчанию: таблица при TTY, json при пайпе)"
  project: "ID проекта, slug или slug организации/проекта (переопределяет проект по умолчанию)"
  help: "Показать справку"
  version_flag: "Показать версию"

cmd:
  ai:
    about: "Операции проверки, улучшения, генерации и аудита на основе ИИ"
    review:
      about: "Запустить проверку ИИ одного элемента спецификации; показывает оценку, вердикт, карту покрытия и пробелы"
      permalink: "Постоянная ссылка на элемент (например, F-5)"
    review_all:
      about: "Запустить пакетную проверку ИИ всех элементов проекта (асинхронно, опрашивает до завершения)"
    improve:
      about: "Предложить улучшение, сгенерированное ИИ, для элемента спецификации; показывает разницу и запрашивает принятие/отклонение"
      permalink: "Постоянная ссылка на элемент (например, F-5)"
      auto_accept: "Автоматически принять предложение без интерактивного запроса"
    generate:
      about: "Генерировать предложения технических спецификаций из функционального элемента"
      permalink: "Постоянная ссылка на элемент (например, F-5)"
    audit:
      about: "Выполнить аудит кода для элемента спецификации и показать покрытие и результаты"
      permalink: "Постоянная ссылка на элемент (например, F-5)"

  auth:
    about: "Управление аутентификацией и учётными данными"
    login:
      about: "Войти в экземпляр FuncSpec"
      host: "URL хоста (по умолчанию: https://funcspec.net)"
      key: "API-ключ (или установить переменную окружения FUNCSPEC_API_KEY)"
      profile: "Имя профиля для сохранения учётных данных"
    logout:
      about: "Выйти и удалить сохранённые учётные данные"
      profile: "Профиль для удаления"
    status:
      about: "Показать текущий статус аутентификации"

  config:
    about: "Управление значениями конфигурации"
    set:
      about: "Установить значение конфигурации"
      key: "Ключ для установки (например, project, host, api_key)"
      value: "Значение для установки"
      local: "Записать в .funcspec в текущем каталоге вместо глобальной конфигурации"
    get:
      about: "Получить значение конфигурации"
      key: "Ключ для получения"
    list:
      about: "Список всех значений конфигурации"
    set_profile:
      about: "Переключить активный профиль"
      name: "Имя профиля для активации"

  projects:
    about: "Просмотр и управление проектами"
    list:
      about: "Список всех проектов"
      json: "Вывод в формате JSON (переопределяет --format)"
    show:
      about: "Показать детали проекта"
      slug: "Slug или ID проекта"
      json: "Вывод в формате JSON (переопределяет --format)"
    set_default:
      about: "Установить проект по умолчанию для команд"
      slug: "Slug проекта (например, \"funcspec-cli\" или \"tambit/funcspec-cli\")"

  items:
    about: "Управление элементами спецификации (функциональными и техническими)"
    list:
      about: "Список элементов спецификации"
      type: "Фильтр по типу: func или tech"
      status: "Фильтр по статусу реализации"
      tag: "Фильтр по тегу"
      q: "Поисковый запрос"
      has_review: "Фильтр: только элементы с проверками"
      review_verdict: "Фильтр по вердикту проверки"
      parent: "Фильтр по родительскому элементу (постоянная ссылка или ID)"
      page: "Номер страницы"
      per: "Элементов на странице"
      sort: "Поле сортировки: score, title, created_at, updated_at, permalink"
      json: "Вывод в формате JSON (переопределяет --format)"
      quiet: "Тихий режим: вывод только постоянных ссылок (переопределяет --format)"
      bare: "Простой TSV-вывод без рамок и заголовков (переопределяет --format)"
      count: "Вывод только количества совпадающих элементов"
    show:
      about: "Показать детали элемента"
      item: "Постоянная ссылка на элемент (например, F-1) или ID"
      json: "Вывод в формате JSON (переопределяет --format)"
    create:
      about: "Создать новый элемент спецификации"
      title: "Заголовок элемента"
      type: "Тип: func или tech"
      description: "Описание (читает из stdin если \"-\")"
      parent: "Постоянная ссылка или ID родительского элемента"
      tag: "Теги (через запятую)"
    update:
      about: "Обновить элемент спецификации"
      item: "Постоянная ссылка на элемент (например, F-377) или ID"
      title: "Новый заголовок"
      description: "Новое описание (читает из stdin если \"-\")"
      status: "Новый статус реализации"
      tag: "Теги (через запятую, заменяет существующие)"
      parent: "Установить родительский элемент (постоянная ссылка или ID)"
      no_parent: "Удалить родителя (сделать элемент верхнего уровня)"
    edit:
      about: "Редактировать описание элемента в $EDITOR"
      item: "Постоянная ссылка на элемент (например, F-1) или ID"
    delete:
      about: "Удалить элемент спецификации"
      item: "Постоянная ссылка или ID элемента"
      yes: "Пропустить подтверждение"
    link:
      about: "Связать коммит с элементом спецификации"
      item: "Постоянная ссылка на элемент (например, F-1) или ID"
      sha: "SHA коммита"
      message: "Сообщение коммита"
    record_run:
      about: "Записать запуск агента для элемента спецификации"
      item: "Постоянная ссылка на элемент (например, F-1) или ID"
      model: "Имя модели (например, claude-opus-4-6)"
      tokens: "Количество токенов"
      cost: "Стоимость в USD"
      status: "Статус запуска (success, failure)"
    transition:
      about: "Перевести элемент спецификации в новый статус реализации"
      item: "Постоянная ссылка на элемент (например, F-1) или ID"
      state: "inbox, draft, accepted, integrated"

  edges:
    about: "Управление рёбрами зависимостей между элементами спецификации"
    list:
      about: "Список рёбер зависимостей (опционально отфильтрованных по источнику, цели или типу)"
      source: "Фильтр по постоянной ссылке или ID исходного элемента (например, F-1)"
      target: "Фильтр по постоянной ссылке или ID целевого элемента (например, T-5)"
      type: "Фильтр по типу ребра (depends_on, implements, tests, blocks, relates_to)"
      json: "Вывод в формате JSON (переопределяет --format)"
    link:
      about: "Создать ребро зависимости между двумя элементами спецификации"
      source: "Постоянная ссылка или ID исходного элемента (например, F-1)"
      target: "Постоянная ссылка или ID целевого элемента (например, T-5)"
      type: "Тип ребра: depends_on, implements, tests, blocks, relates_to"
    unlink:
      about: "Удалить ребро зависимости по ID (или по --source/--target/--type)"
      edge_id: "ID ребра для удаления"
      source: "Постоянная ссылка или ID исходного элемента (для поиска ребра)"
      target: "Постоянная ссылка или ID целевого элемента (для поиска ребра)"
      type: "Фильтр типа ребра (для поиска ребра)"
      yes: "Пропустить запрос подтверждения"

  instructions:
    about: "Получить живые инструкции агента для текущего проекта"
    raw: "Вывести полный JSON-ответ вместо только поля содержимого. Имеет приоритет над --format."

  onboard:
    about: "Интерактивный мастер настройки — аутентификация, конфигурация и создание файлов агента"
    non_interactive: "Запустить в неинтерактивном режиме (для CI). Требует FUNCSPEC_API_KEY или --api-key."
    api_key: "API-ключ (переопределяет переменную окружения FUNCSPEC_API_KEY)"
    set_project: "Предварительно выбрать slug проекта по умолчанию (пропустить интерактивный выбор)"
    skip_llm: "Пропустить шаг интеграции файла конфигурации агента LLM"
    llm_configs: "Путь к конкретному файлу конфигурации LLM для обновления (повторяемый)"
    dry_run: "Показать, что произошло бы, не записывая ничего"
    dir: "Целевой каталог для FUNCSPEC.md и сканирования конфигурации LLM"

  doctor:
    about: "Проверить локальную среду и показать отчёт о состоянии"
    json: "Вывод результатов в формате JSON"
    fix: "Автоматически исправлять проблемы там, где это возможно"
    yes: "Автоматически подтверждать исправления без запроса (использовать с --fix)"
    quiet: "Показывать только сбои и предупреждения"
    no_color: "Отключить вывод цветов ANSI (также соблюдается через переменную окружения NO_COLOR)"
    verbose: "Показывать дополнительные детали для каждой проверки"
    timeout: "Тайм-аут в секундах для каждой проверки, зависящей от сети"
    dir: "Целевой каталог для FUNCSPEC.md и сканирования конфигурации LLM"

  search:
    about: "Поиск элементов спецификации по полнотекстовому запросу"
    query: "Строка поискового запроса"
    type: "Фильтр по типу: func или tech"
    tag: "Фильтр по тегу"
    json: "Вывод в формате JSON (переопределяет --format)"
    quiet: "Тихий режим: вывод только постоянных ссылок, по одной на строку (переопределяет --format)"
    count: "Вывод только количества совпадающих элементов"

  stats:
    about: "Показать статистику проекта и панель управления"
    json: "Вывод в формате JSON (машиночитаемый)"
    usage: "Сосредоточиться на статистике использования LLM"
    month: "Месяц для статистики использования в формате YYYY-MM (например, 2026-03)"

  export:
    about: "Экспорт спецификации проекта в различных форматах"
    long_about: "Экспортировать текущую спецификацию проекта как markdown, JSON, CSV, HTML, PDF или DOCX.\nТекстовые форматы (md, json, csv) потоком передаются в stdout, если не указан -o.\nДвоичные форматы (pdf, docx) требуют -o или по умолчанию используют <slug>.<ext>."
    export_format: "Формат экспорта (md, json, csv, html, pdf, docx)"
    output: "Записать вывод в этот файл вместо stdout"
    type: "Фильтр по типу: func или tech"
    tag: "Фильтр по тегу"
    open: "Открыть в браузере после записи (только HTML)"

  snapshots:
    about: "Управление снимками проекта (точки сохранения/восстановления)"
    list:
      about: "Список всех снимков текущего проекта"
      json: "Вывод в формате JSON (переопределяет --format)"
    create:
      about: "Создать новый снимок"
      name: "Имя снимка (например, \"pre-v2-refactor\")"
      description: "Необязательное описание"
    show:
      about: "Показать детали снимка и сводку элементов"
      identifier: "ID или имя снимка"
      json: "Вывод в формате JSON (переопределяет --format)"
    restore:
      about: "Восстановить проект до снимка (деструктивно!)"
      identifier: "ID или имя снимка"
      yes: "Пропустить запрос подтверждения"
    diff:
      about: "Показать, что изменилось с момента создания снимка"
      identifier: "ID или имя снимка"
      json: "Вывод в формате JSON (переопределяет --format)"
    delete:
      about: "Удалить снимок"
      identifier: "ID или имя снимка"
      yes: "Пропустить запрос подтверждения"

  view:
    about: "Открыть спецификацию проекта (или конкретный элемент) в браузере"
    long_about: "Открыть страницу спецификации текущего проекта в браузере по умолчанию.\nПередайте ID элемента (например, F-377), чтобы перейти непосредственно к этому элементу.\nИспользуйте --url для вывода URL без открытия браузера."
    item_id: "ID элемента для открытия (например, F-377); опустить для просмотра полной спецификации проекта"
    url: "Вывести URL вместо открытия браузера"

  version:
    about: "Показать информацию о версии"

  completion:
    about: "Генерировать скрипты автодополнения для оболочки"
    shell: "Оболочка для генерации автодополнений"
